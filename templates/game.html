<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if game %}{{ game.name }} - Game Hub{% else %}Game Not Found{% endif %}</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --line: #dddddd;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
    }
    h1 {
      font-size: 1.2rem;
      margin: 0 0 10px 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .game-container {
      width: 100%;
      height: 600px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button {
      border: 1px solid #222;
      background: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    button:active { transform: scale(0.99); }
    .small { font-size: 0.8rem; color: #555; }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>
      {% if game %}
        {{ game.name }}
      {% else %}
        Game Hub
      {% endif %}
    </h1>

    {% if error %}
      <div class="error">
        <strong>Error:</strong> {{ error }}
      </div>
    {% endif %}

    {% if game %}
      <div class="card">
        <div class="small">{{ game.description }}</div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 8px 0;">Game</h3>
        <div class="game-container">
          {% if game.id == 'maze_game' %}
            <iframe src="/static/games/maze/index.html" class="game-frame" title="{{ game.name }}"></iframe>
          {% else %}
            <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
              <div class="small">Game content not available yet</div>
            </div>
          {% endif %}
        </div>
      </div>
    {% endif %}

    <div class="row">
      <button onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
  </div>
</body>
</html>
